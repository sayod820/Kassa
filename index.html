<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ════════════════════════════════════════════
//  SUPABASE REST API
// ════════════════════════════════════════════
const SB='https://lozieoldpkezxonrxwry.supabase.co/rest/v1';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxvemllb2xkcGtlenhvbnJ4d3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMzY0MjEsImV4cCI6MjA5MzYxMjQyMX0.sS5Z8i1xFdv6YiKrpL9Y2sTWEo6Yk3K9TqQhv4HNwts';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function sbGet(table,q=''){ const r=await fetch(`${SB}/${table}?${q}`,{headers:H}); return r.json(); }
async function sbPost(table,body){ const r=await fetch(`${SB}/${table}`,{method:'POST',headers:H,body:JSON.stringify(body)}); return r.json(); }
async function sbDel(table,id){ await fetch(`${SB}/${table}?id=eq.${id}`,{method:'DELETE',headers:H}); }

// ════════ IN-MEMORY DB ════════
const DB={suppliers:[],deliveries:[],delivery_items:[],products:[],revisions:[],revision_items:[],expenses:[],revenue:[],cash_movements:[]};
let _ready=false,_subs=[];
const pub=()=>_subs.forEach(fn=>fn());
const sub=fn=>{ _subs.push(fn); return ()=>{ _subs=_subs.filter(f=>f!==fn); }; };

// Каталог товаров загружается из Supabase (GBS.Market)

async function fetchAllProducts(){
  const PAGE=1000;
  let all=[], page=0;
  while(true){
    const batch=await sbGet('products',`select=*&order=name.asc&limit=${PAGE}&offset=${page*PAGE}`);
    if(!Array.isArray(batch)||!batch.length) break;
    all=[...all,...batch];
    if(batch.length<PAGE) break;
    page++;
  }
  return all;
}

async function initDB(){
  try{
    const [sup,del,di,prod,rev,ri,exp,rvn,cm]=await Promise.all([
      sbGet('suppliers','select=*&order=created_at.desc'),
      sbGet('deliveries','select=*&order=created_at.desc'),
      sbGet('delivery_items','select=*&order=created_at.desc'),
      fetchAllProducts(),
      sbGet('revisions','select=*&order=created_at.desc'),
      sbGet('revision_items','select=*'),
      sbGet('expenses','select=*&order=created_at.desc'),
      sbGet('revenue','select=*&order=created_at.desc'),
      sbGet('cash_movements','select=*&order=created_at.desc'),
    ]);
    DB.suppliers=Array.isArray(sup)?sup:[];
    DB.deliveries=Array.isArray(del)?del:[];
    DB.delivery_items=Array.isArray(di)?di:[];
    DB.products=Array.isArray(prod)?prod:[];
    DB.revisions=Array.isArray(rev)?rev:[];
    DB.revision_items=Array.isArray(ri)?ri:[];
    DB.expenses=Array.isArray(exp)?exp:[];
    DB.revenue=Array.isArray(rvn)?rvn:[];
    DB.cash_movements=Array.isArray(cm)?cm:[];
    // Каталог товаров загружен из Supabase (GBS.Market sync)
  }catch(e){ console.error('initDB error:',e); }
  _ready=true; pub();
}

function dbGet(k){ return DB[k]||[]; }

async function dbInsert(table,row){
  const res=await sbPost(table,row);
  const inserted=Array.isArray(res)?res[0]:res;
  DB[table]=[inserted,...DB[table]];
  pub();
  return inserted;
}
async function dbInsertMany(table,rows){
  if(!rows.length)return;
  const res=await sbPost(table,rows);
  const inserted=Array.isArray(res)?res:[];
  DB[table]=[...inserted,...DB[table]];
  pub();
}
async function dbDelete(table,id){
  await sbDel(table,id);
  DB[table]=DB[table].filter(r=>r.id!==id);
  pub();
}

// ════════ UTILS ════════
// UTC+5 Таджикистан
const OFFSET=5*60*60*1000;
const localNow=()=>new Date(Date.now()+OFFSET);
const uid=()=>'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
const now=()=>new Date().toISOString();
const tod=()=>localNow().toISOString().slice(0,10);
const monStr=()=>localNow().toISOString().slice(0,7);
const daysAgo=n=>{ const d=localNow(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); };
const fmt=n=>(+n||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=d=>{ if(!d)return''; return new Date(d+'T00:00:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'}); };
const fmtDs=d=>{ if(!d)return{day:'?',mon:'?'}; const dt=new Date(d+'T00:00:00'); return{day:dt.getDate(),mon:dt.toLocaleDateString('ru-RU',{month:'short'}).replace('.','')}; };
const fmtT=s=>{ if(!s)return''; const d=new Date(new Date(s).getTime()+OFFSET); return d.toISOString().slice(11,16); };
const dLeft=d=>{ if(!d)return 999; return Math.ceil((new Date(d)-new Date(tod()))/86400000); };
const eColor=n=>n<0?'#f04f5a':n<=3?'#f09040':n<=7?'#e8c040':'#3ecf8e';
const eText=n=>n<0?`просрочен ${Math.abs(n)}д`:n===0?'сегодня!':n+' дн.';
const inits=n=>n.trim().split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';
const getMonths=n=>{ const r=[],d=new Date(); for(let i=0;i<n;i++){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'); r.push({val:`${y}-${m}`,label:d.toLocaleDateString('ru-RU',{month:'long',year:'2-digit'})}); d.setMonth(d.getMonth()-1); } return r; };
const weekStart=()=>{ const d=localNow(),day=d.getDay()||7; d.setDate(d.getDate()-day+1); return d.toISOString().slice(0,10); };

// ════════ ТЕМА ════════
const C={bg:'#09090f',bg2:'#111120',bg3:'#18182e',border:'#1e1e38',text:'#eeeeff',muted:'#6868a0',dim:'#32324a',green:'#3ecf8e',red:'#f04f5a',orange:'#f09040',blue:'#4466ff',yellow:'#e8c040'};
const css=`*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{to{transform:rotate(360deg)}}.fu{animation:su .18s ease}input,select,button{font-family:inherit}input::placeholder{color:#32324a}::-webkit-scrollbar{display:none}`;

// ════════ КОМПОНЕНТЫ ════════
const Card=({children,style,ac})=><div style={{background:C.bg2,border:`1px solid ${ac||C.border}`,borderRadius:18,padding:16,marginBottom:10,...style}}>{children}</div>;
const FL=({children})=><div style={{fontSize:9,fontWeight:800,letterSpacing:2,textTransform:'uppercase',color:C.dim,marginBottom:6}}>{children}</div>;
const TI=({label,value,onChange,type,placeholder,autoFocus,style})=>(
  <div style={{marginBottom:12}}>
    {label&&<FL>{label}</FL>}
    <input autoFocus={autoFocus} type={type||'text'} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,padding:'13px 16px',color:C.text,fontSize:15,fontWeight:500,outline:'none',WebkitAppearance:'none',...style}}/>
  </div>
);
const Btn=({children,onClick,bg,color,outline,disabled,style})=>(
  <button onClick={onClick} disabled={disabled} style={{width:'100%',padding:'14px 20px',borderRadius:13,fontSize:15,fontWeight:800,cursor:disabled?'not-allowed':'pointer',border:outline?`1.5px solid ${C.border}`:'none',background:disabled?C.bg3:outline?'transparent':(bg||C.blue),color:disabled?C.dim:color||(outline?C.muted:'#fff'),opacity:disabled?.6:1,...style}}>{children}</button>
);
const SecLabel=({children})=><div style={{fontSize:9,fontWeight:800,letterSpacing:2,textTransform:'uppercase',color:C.dim,margin:'14px 0 8px 2px'}}>{children}</div>;
const Badge=({children,color})=><span style={{fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:7,background:(color||C.blue)+'18',color:color||C.blue,display:'inline-block'}}>{children}</span>;
const Empty=({icon,text})=><div style={{textAlign:'center',padding:'48px 20px',color:C.dim}}><div style={{fontSize:48,marginBottom:12,opacity:.5}}>{icon}</div><div style={{fontSize:14,lineHeight:1.6,fontWeight:500}}>{text}</div></div>;
const Hdr=({title,sub,onBack,onAdd,children})=>(
  <div style={{padding:'14px 16px 12px',background:'rgba(9,9,15,.97)',backdropFilter:'blur(20px)',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:50,display:'flex',alignItems:'center',gap:10}}>
    {onBack&&<button onClick={onBack} style={{width:38,height:38,borderRadius:11,background:C.bg2,border:`1px solid ${C.border}`,color:C.muted,fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>←</button>}
    <div style={{flex:1}}><div style={{fontSize:9,fontWeight:800,letterSpacing:2.5,textTransform:'uppercase',color:C.dim}}>{sub||'KASSACONTROL'}</div><div style={{fontSize:20,fontWeight:900,letterSpacing:-.5}}>{title}</div></div>
    {onAdd&&<button onClick={onAdd} style={{width:40,height:40,borderRadius:12,background:C.blue,border:'none',color:'#fff',fontSize:28,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,lineHeight:1,paddingBottom:2}}>+</button>}
    {children}
  </div>
);
const Toast=({msg,color})=>msg?<div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:C.bg2,border:`1.5px solid ${color||C.green}`,borderRadius:14,padding:'12px 22px',fontSize:14,fontWeight:700,color:C.text,zIndex:999,whiteSpace:'nowrap',boxShadow:'0 8px 40px rgba(0,0,0,.6)',pointerEvents:'none'}}>{msg}</div>:null;

// ════════════════════════════════════════════
//  1. ГЛАВНАЯ (ДАШБОРД)
// ════════════════════════════════════════════
function Home({tick}){
  const [period,setPeriod]=useState('day');
  const t=tod(), ws=weekStart(), ms=monStr();
  const filterD=d=>period==='day'?d===t:period==='week'?d>=ws:period==='month'?d.startsWith(ms):true;

  const rev=dbGet('revenue'), exp=dbGet('expenses'), cash=dbGet('cash_movements');
  const diItems=dbGet('delivery_items'), revisions=dbGet('revisions'), riItems=dbGet('revision_items');

  const totalRev=rev.filter(r=>filterD(r.date)).reduce((s,r)=>s+ +r.amount,0);
  const totalGbs=rev.filter(r=>filterD(r.date)).reduce((s,r)=>s+ +(r.profit||0),0);
  const totalExp=exp.filter(e=>filterD(e.date)).reduce((s,e)=>s+ +e.amount,0);
  const cleanP=totalGbs-totalExp;
  const gbsPct=totalRev>0?Math.round((totalGbs/totalRev)*100):0;
  const cleanPct=totalRev>0?Math.round((cleanP/totalRev)*100):0;

  let cashBal=0; cash.forEach(m=>{ if(m.type==='add'||m.type==='revenue') cashBal+= +m.amount; else cashBal-= +m.amount; });

  const withExp=diItems.filter(i=>i.expiry_date);
  const expired=withExp.filter(i=>dLeft(i.expiry_date)<0);
  const critical=withExp.filter(i=>{ const d=dLeft(i.expiry_date); return d>=0&&d<=3; });
  const soon=withExp.filter(i=>{ const d=dLeft(i.expiry_date); return d>3&&d<=7; });

  // Ревизии за выбранный период
  const periodRevs=revisions.filter(r=>filterD(r.date));
  const lastRev=[...revisions].sort((a,b)=>b.created_at.localeCompare(a.created_at))[0];
  const activeRevs=periodRevs.length>0?periodRevs:[lastRev].filter(Boolean);
  const lrItems=riItems.filter(i=>activeRevs.some(r=>r.id===i.revision_id));
  const lrChecked=lrItems.filter(i=>i.actual!==null);
  const lrShort=lrChecked.filter(i=>i.actual<i.expected);
  const lrSumExp=lrChecked.reduce((s,i)=>s+i.expected*(i.price||0),0);
  const lrSumAct=lrChecked.reduce((s,i)=>s+i.actual*(i.price||0),0);
  const lrLoss=lrSumExp-lrSumAct;

  const now2=new Date();
  const dateLabel=now2.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',timeZone:TZ});
  const hasAlert=(expired.length+critical.length)>0;

  return(
    <>
      <div style={{padding:'16px 16px 12px',background:'rgba(9,9,15,.97)',backdropFilter:'blur(20px)',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div><div style={{fontSize:9,fontWeight:800,letterSpacing:2,color:C.dim,textTransform:'uppercase',marginBottom:3}}>{dateLabel}</div><div style={{fontSize:22,fontWeight:900,letterSpacing:-.5}}>🏪 KassaControl</div></div>
          {hasAlert&&<div style={{background:'#f04f5a18',border:'1px solid #f04f5a50',borderRadius:14,padding:'6px 14px',textAlign:'center'}}><div style={{fontSize:9,color:C.red,fontWeight:800}}>ВНИМАНИЕ</div><div style={{fontSize:18,fontWeight:900,color:C.red}}>☠ {expired.length+critical.length}</div></div>}
        </div>
        <div style={{display:'flex',gap:6}}>
          {[['day','День'],['week','Неделя'],['month','Месяц'],['all','Всё']].map(([id,l])=>(
            <button key={id} onClick={()=>setPeriod(id)} style={{flex:1,padding:'8px 4px',borderRadius:10,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:800,border:`1.5px solid ${period===id?C.blue+'60':C.border}`,background:period===id?C.blue+'18':C.bg2,color:period===id?C.blue:C.dim}}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{padding:14,paddingBottom:30}}>
        {/* Чистая прибыль */}
        <div style={{background:`linear-gradient(135deg,${cleanP>=0?'#0d2d1a':'#2d0d12'},${C.bg2})`,border:`1.5px solid ${cleanP>=0?C.green+'50':C.red+'50'}`,borderRadius:20,padding:'20px',marginBottom:12,textAlign:'center'}}>
          <div style={{fontSize:9,fontWeight:800,letterSpacing:2.5,color:C.dim,marginBottom:8}}>ЧИСТАЯ ПРИБЫЛЬ</div>
          <div style={{fontSize:48,fontWeight:900,color:cleanP>=0?C.green:C.red,letterSpacing:-2,lineHeight:1}}>{cleanP>=0?'+':''}{fmt(cleanP)}</div>
          <div style={{fontSize:13,color:C.dim,marginTop:5}}>SM · {cleanPct}% от выручки</div>
          <div style={{fontSize:11,color:C.dim,marginTop:4}}>Прибыль GBS ({fmt(totalGbs)} SM) − Расходы ({fmt(totalExp)} SM)</div>
        </div>
        {/* Выручка + расходы */}
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <div style={{flex:1,background:C.bg2,border:`1px solid ${C.green}30`,borderRadius:16,padding:'14px 12px'}}>
            <div style={{fontSize:9,fontWeight:800,letterSpacing:1.5,color:C.dim,textTransform:'uppercase',marginBottom:6}}>Выручка</div>
            <div style={{fontSize:20,fontWeight:900,color:C.green}}>{fmt(totalRev)}</div>
            <div style={{fontSize:10,color:C.dim,marginTop:3}}>SM · маржа {gbsPct}%</div>
          </div>
          <div style={{flex:1,background:C.bg2,border:`1px solid ${C.red}30`,borderRadius:16,padding:'14px 12px'}}>
            <div style={{fontSize:9,fontWeight:800,letterSpacing:1.5,color:C.dim,textTransform:'uppercase',marginBottom:6}}>Расходы</div>
            <div style={{fontSize:20,fontWeight:900,color:C.red}}>−{fmt(totalExp)}</div>
            <div style={{fontSize:10,color:C.dim,marginTop:3}}>SM</div>
          </div>
        </div>
        {/* Касса */}
        <div style={{background:C.bg2,border:`1.5px solid ${cashBal>=0?C.blue+'40':C.red+'40'}`,borderRadius:16,padding:'14px 16px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div><div style={{fontSize:9,fontWeight:800,letterSpacing:2,color:C.dim,marginBottom:4}}>🏧 НАЛИЧНЫЕ В КАССЕ</div><div style={{fontSize:28,fontWeight:900,color:cashBal>=0?C.blue:C.red}}>{fmt(Math.abs(cashBal))} SM</div></div>
          <div style={{fontSize:40,opacity:.35}}>🏧</div>
        </div>
        {/* Сроки */}
        <div style={{background:C.bg2,border:`1px solid ${(expired.length+critical.length)>0?C.red+'40':C.border}`,borderRadius:16,overflow:'hidden',marginBottom:12}}>
          <div style={{padding:'10px 16px',background:C.bg3,borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.dim}}>☠️ СРОКИ ГОДНОСТИ</div>
            {(expired.length+critical.length)>0&&<div style={{fontSize:11,fontWeight:800,color:C.red}}>Требует внимания!</div>}
          </div>
          <div style={{display:'flex'}}>
            {[['Просрочено',expired.length,C.red,'☠'],['Критично',critical.length,C.orange,'⚠'],['Скоро',soon.length,C.yellow,'!']].map(([l,n,c,ic])=>(
              <div key={l} style={{flex:1,padding:'13px 10px',textAlign:'center',borderRight:l!=='Скоро'?`1px solid ${C.border}`:'none'}}>
                <div style={{fontSize:9,fontWeight:800,color:C.dim,marginBottom:4}}>{l}</div>
                <div style={{fontSize:24,fontWeight:900,color:n>0?c:C.dim}}>{n}</div>
                <div style={{fontSize:12,marginTop:2}}>{n>0?ic:'✓'}</div>
              </div>
            ))}
          </div>
          {expired.slice(0,2).map(item=>(
            <div key={item.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 16px',borderTop:`1px solid ${C.red}25`}}>
              <div style={{fontSize:13}}>{item.product_name}</div>
              <div style={{fontSize:11,fontWeight:800,color:C.red}}>☠ {Math.abs(dLeft(item.expiry_date))}д назад</div>
            </div>
          ))}
        </div>
        {/* Ревизия */}
        {activeRevs.length>0&&(
          <div style={{background:C.bg2,border:`1px solid ${lrShort.length>0?C.red+'35':C.border}`,borderRadius:16,overflow:'hidden',marginBottom:12}}>
            <div style={{padding:'10px 16px',background:C.bg3,borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.dim}}>📦 РЕВИЗИЯ{activeRevs.length>1?` · ${activeRevs.length} ШТ`:` · ${fmtD(activeRevs[0]?.date||'').toUpperCase()}`}</div>
              {activeRevs.length>1&&<div style={{fontSize:10,color:C.blue,fontWeight:700}}>{activeRevs.length} ревизий</div>}
            </div>
            <div style={{display:'flex'}}>
              {[['Позиций',lrItems.length,C.blue],['Недостача',lrShort.length,lrShort.length>0?C.red:C.green],['Потери',lrLoss>0?`-${fmt(lrLoss)} SM`:'✓ 0',lrLoss>0?C.red:C.green]].map(([l,v,c])=>(
                <div key={l} style={{flex:1,padding:'13px 10px',textAlign:'center',borderRight:l!=='Потери'?`1px solid ${C.border}`:'none'}}>
                  <div style={{fontSize:9,fontWeight:800,color:C.dim,marginBottom:4}}>{l}</div>
                  <div style={{fontSize:l==='Потери'?14:22,fontWeight:900,color:c}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        {/* Расходы детали */}
        {exp.filter(e=>filterD(e.date)).length>0&&(()=>{
          const byR={}; exp.filter(e=>filterD(e.date)).forEach(e=>{ byR[e.reason]=(byR[e.reason]||0)+ +e.amount; });
          return(
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,overflow:'hidden'}}>
              <div style={{padding:'10px 16px',background:C.bg3,borderBottom:`1px solid ${C.border}`}}><div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.dim}}>💸 РАСХОДЫ ПО СТАТЬЯМ</div></div>
              {Object.entries(byR).sort((a,b)=>b[1]-a[1]).map(([r,a])=>(
                <div key={r} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 16px',borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontSize:13,color:C.muted}}>{r}</div>
                  <div style={{fontSize:14,fontWeight:800,color:C.red}}>−{fmt(a)} SM</div>
                </div>
              ))}
            </div>
          );
        })()}

        {/* ── ЛЕНТА СОБЫТИЙ ── */}
        {(()=>{
          const events=[];
          rev.filter(r=>filterD(r.date)).forEach(r=>events.push({
            id:'rv'+r.id,time:r.created_at,icon:'💰',color:C.green,
            title:`+${fmt(r.amount)} SM`,sub:'Выручка'+(r.profit?` · GBS: ${fmt(r.profit)} SM`:''),date:r.date
          }));
          exp.filter(e=>filterD(e.date)).forEach(e=>events.push({
            id:'ex'+e.id,time:e.created_at,icon:'💸',color:C.red,
            title:`−${fmt(e.amount)} SM`,sub:e.reason,date:e.date
          }));
          cash.filter(m=>filterD(m.date)&&(m.type==='add'||m.type==='remove')).forEach(m=>events.push({
            id:'cs'+m.id,time:m.created_at,icon:m.type==='add'?'➕':'➖',color:m.type==='add'?C.blue:C.orange,
            title:`${m.type==='add'?'+':'−'}${fmt(m.amount)} SM`,sub:(m.type==='add'?'Внесено':'Снято')+(m.description?` · ${m.description}`:''),date:m.date
          }));
          activeRevs.filter(r=>filterD(r.date)).forEach(r=>{
            const its=riItems.filter(i=>i.revision_id===r.id&&i.actual!==null);
            const loss=its.reduce((s,i)=>s+i.expected*(i.price||0),0)-its.reduce((s,i)=>s+i.actual*(i.price||0),0);
            events.push({id:'re'+r.id,time:r.created_at,icon:'📦',color:loss>0?C.red:C.green,
              title:`Ревизия · ${r.category||'Все'}`,sub:`${its.length} поз.${loss>0?` · потери −${fmt(loss)} SM`:' · ✓ OK'}`,date:r.date});
          });
          events.sort((a,b)=>b.time.localeCompare(a.time));
          if(!events.length) return null;
          return(
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,overflow:'hidden',marginTop:12}}>
              <div style={{padding:'10px 16px',background:C.bg3,borderBottom:`1px solid ${C.border}`}}>
                <div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.dim}}>📋 ИСТОРИЯ ОПЕРАЦИЙ · {events.length}</div>
              </div>
              {events.map((ev,i)=>(
                <div key={ev.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 16px',borderBottom:i<events.length-1?`1px solid ${C.border}`:'none'}}>
                  <div style={{width:38,height:38,borderRadius:11,background:ev.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{ev.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:800,color:ev.color}}>{ev.title}</div>
                    <div style={{fontSize:11,color:C.dim,marginTop:2}}>{ev.sub}</div>
                  </div>
                  <div style={{fontSize:10,color:C.dim,flexShrink:0,textAlign:'right'}}>{fmtD(ev.date)}<br/>{fmtT(ev.time)}</div>
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    </>
  );
}

function Posting({supplier,onBack,onSaved}){
  const [date,setDate]=useState(tod());
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(null);
  const [qty,setQty]=useState('');
  const [expiry,setExpiry]=useState('');
  const [addedItems,setAddedItems]=useState([]);
  const [editId,setEditId]=useState(null);
  const [editQty,setEditQty]=useState('');
  const [editExp,setEditExp]=useState('');
  const [err,setErr]=useState('');
  const catalog=dbGet('products');
  const results=search.trim().length>=1?(()=>{
    const q=search.trim();
    const ql=q.toLowerCase();
    const isNum=/^\d+$/.test(q);

    const all=catalog.filter(p=>
      p.name.toLowerCase().includes(ql)||
      (p.barcode&&p.barcode.includes(q))
    );

    all.sort((a,b)=>{
      const score=(p)=>{
        const bar=p.barcode||'';
        const nm=p.name.toLowerCase();
        if(isNum){
          if(bar===q)            return 0; // точный штрихкод
          if(bar.endsWith(q))    return 1; // конец штрихкода
          if(bar.startsWith(q))  return 2; // начало штрихкода
          if(bar.includes(q))    return 3; // внутри штрихкода
          if(nm.includes(ql))    return 4; // в названии
          return 5;
        } else {
          if(nm===ql)            return 0; // точное название
          if(nm.startsWith(ql))  return 1; // начало названия
          if(nm.includes(ql))    return 2; // внутри названия
          if(bar.includes(q))    return 3; // в штрихкоде
          return 4;
        }
      };
      return score(a)-score(b);
    });
    return all.slice(0,10);
  })():[];

  const addToList=()=>{
    if(!qty||+qty<=0){setErr('Введите количество');return;}

// FIFO расчёт остатков по партиям
function calcFifoRemaining(deliveryItems, products) {
  // Группируем по штрихкоду
  const byBarcode = {};
  deliveryItems.filter(i=>i.expiry_date && i.barcode).forEach(i=>{
    if(!byBarcode[i.barcode]) byBarcode[i.barcode]=[];
    byBarcode[i.barcode].push({...i});
  });

  const result = [];
  Object.entries(byBarcode).forEach(([barcode, batches])=>{
    // Текущий остаток из GBS.Market
    const prod = products.find(p=>p.barcode===barcode);
    const currentStock = prod ? (prod.stock||0) : null;

    // Сортируем по дате поставки (старые первые — FIFO)
    const sorted = [...batches].sort((a,b)=>{
      const da = dbGet('deliveries').find(d=>d.id===a.delivery_id);
      const db2 = dbGet('deliveries').find(d=>d.id===b.delivery_id);
      return (da?.date||'').localeCompare(db2?.date||'');
    });

    if(currentStock === null){
      // Нет данных из GBS — показываем оригинальное количество
      sorted.forEach(b=>result.push({...b, remaining: b.quantity}));
      return;
    }

    // FIFO: списываем проданное с самых старых партий
    const totalReceived = sorted.reduce((s,b)=>s+b.quantity,0);
    let sold = Math.max(0, totalReceived - currentStock);
    let leftToSell = sold;

    sorted.forEach(batch=>{
      let remaining = batch.quantity;
      if(leftToSell > 0){
        const deduct = Math.min(leftToSell, batch.quantity);
        remaining = batch.quantity - deduct;
        leftToSell -= deduct;
      }
      result.push({...batch, remaining, originalQty: batch.quantity});
    });
  });

  // Товары без штрихкода — без FIFO
  deliveryItems.filter(i=>i.expiry_date && !i.barcode).forEach(i=>{
    result.push({...i, remaining: i.quantity});
  });

  return result;
}

function Expiry({tick}){
  const [filter,setFilter]=useState('all');
  const allItems=dbGet('delivery_items').filter(i=>i.expiry_date);
  const products=dbGet('products');
  const dels=dbGet('deliveries');
  const delMap=Object.fromEntries(dels.map(d=>[d.id,d]));

  // Применяем FIFO
  const itemsWithRemaining = calcFifoRemaining(allItems, products);

  // Только товары где остаток > 0 (или просроченные с остатком)
  const enriched = itemsWithRemaining
    .filter(i=>i.remaining > 0)
    .map(i=>({...i, days:dLeft(i.expiry_date), delivery:delMap[i.delivery_id]||null}));

  const counts={all:enriched.length,expired:enriched.filter(i=>i.days<0).length,critical:enriched.filter(i=>i.days>=0&&i.days<=3).length,week:enriched.filter(i=>i.days>=0&&i.days<=7).length,month:enriched.filter(i=>i.days>=0&&i.days<=30).length};
  const filtered=enriched.filter(i=>filter==='all'?true:filter==='expired'?i.days<0:filter==='critical'?i.days>=0&&i.days<=3:filter==='week'?i.days>=0&&i.days<=7:i.days>=0&&i.days<=30).sort((a,b)=>a.days-b.days);
  const FILTERS=[{id:'all',l:'Все'},{id:'expired',l:`☠ Просрочено${counts.expired?` (${counts.expired})`:''}`},{id:'critical',l:`⚠ До 3 дней${counts.critical?` (${counts.critical})`:''}`},{id:'week',l:'До 7 дней'},{id:'month',l:'До 30 дней'}];
  return(
    <>
      <Hdr title="Сроки годности"/>
      <div style={{padding:14,paddingBottom:30}}>
        <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:4,marginBottom:14}}>
          {FILTERS.map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:'8px 14px',borderRadius:22,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:800,whiteSpace:'nowrap',flexShrink:0,border:`1.5px solid ${filter===f.id?C.blue+'80':C.border}`,background:filter===f.id?C.blue+'18':C.bg2,color:filter===f.id?C.blue:C.dim}}>{f.l}</button>
          ))}
        </div>
        {!filtered.length?<Empty icon="✅" text="Всё в норме"/>:
        filtered.map(item=>{
          const st={icon:item.days<0?'☠️':item.days<=3?'⚠️':item.days<=7?'❗':'✅',color:eColor(item.days),label:eText(item.days)};
          return(
            <div key={item.id} className="fu" style={{background:C.bg2,border:`1px solid ${item.days<0?C.red+'35':item.days<=3?C.orange+'35':C.border}`,borderRadius:18,marginBottom:10,overflow:'hidden',display:'flex'}}>
              <div style={{width:4,background:st.color+'cc',flexShrink:0}}/>
              <div style={{flex:1,padding:'14px 16px'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:8}}>
                  <div style={{flex:1}}><div style={{fontSize:16,fontWeight:800,marginBottom:3}}>{item.product_name}</div>{item.barcode&&<div style={{fontSize:11,color:C.dim}}>🏷 {item.barcode}</div>}</div>
                  <div style={{flexShrink:0,textAlign:'right'}}><div style={{fontSize:22,marginBottom:2}}>{st.icon}</div><div style={{fontSize:13,fontWeight:900,color:st.color}}>{item.days<0?Math.abs(item.days):item.days} дн.</div></div>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
                  {item.originalQty && item.remaining < item.originalQty ? (
                    <span style={{fontSize:12,fontWeight:800,padding:'3px 9px',borderRadius:7,background:C.orange+'18',color:C.orange}}>
                      {item.remaining} из {item.originalQty} {item.unit}
                    </span>
                  ) : (
                    <Badge color={C.blue}>{item.remaining||item.quantity} {item.unit}</Badge>
                  )}

                </div>
                <div style={{background:C.bg3,borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div><div style={{fontSize:9,fontWeight:800,letterSpacing:1.5,color:C.dim,marginBottom:3}}>ПАРТИЯ</div><div style={{fontSize:13,fontWeight:700,color:C.muted}}>до {fmtD(item.expiry_date)}</div></div>
                  <div style={{fontSize:12,fontWeight:900,padding:'4px 12px',borderRadius:10,background:st.color+'20',color:st.color,border:`1px solid ${st.color}40`}}>{st.label}</div>
                </div>
              </div>
            </div>
          );

  );

  const [sc,setSc]=useState('list');

  if(sc==='new') return <NewRevision onBack={()=>setSc('list')} onSaved={()=>{ toast('✓ Ревизия сохранена'); setSc('list'); }}/>;
  if(sc==='view'&&curRev) return <RevisionView revision={curRev} onBack={()=>setSc('list')} onDeleted={()=>{ toast('Ревизия удалена'); setSc('list'); }}/>;
  const revisions=[...dbGet('revisions')].sort((a,b)=>b.created_at.localeCompare(a.created_at));
  const riAll=dbGet('revision_items');
  return(
    <>
      <Hdr title="Ревизия" onAdd={()=>setSc('new')}/>

        {!revisions.length?<Empty icon="📦" text="Ревизий нет. Нажми + чтобы начать."/>:

          return(
            <div key={rev.id} className="fu" onClick={()=>{setCurRev(rev);setSc('view');}} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:C.bg2,border:`1px solid ${short>0?C.red+'35':C.border}`,borderRadius:16,marginBottom:8,cursor:'pointer'}}>

              <div style={{color:C.dim,fontSize:20}}>›</div>
            </div>
          );
        })}

    </>
  );
}

function NewRevision({onBack,onSaved}){
  const [step,setStep]=useState('setup');
  const [selCats,setSelCats]=useState([]);
  const [date,setDate]=useState(tod());
  const [items,setItems]=useState([]);
  const [search,setSearch]=useState('');
  const [saved,setSaved]=useState(false);
  const [page,setPage]=useState(1);
  const PAGE=50;

  const products=dbGet('products');
  const cats=[...new Set(products.map(p=>p.category).filter(Boolean))].sort();

  const toggleCat=cat=>setSelCats(prev=>prev.includes(cat)?prev.filter(c=>c!==cat):[...prev,cat]);

  const getProdByCats=cList=>{
    const filtered=cList.length===0?products:products.filter(p=>cList.includes(p.category));
    return filtered.map(p=>({
      id:p.id,product_name:p.name,barcode:p.barcode||'',
      unit:p.unit||'шт',category:p.category,price:p.price||0,
      totalQty:p.stock||0,partCount:1,

  const catLabel=selCats.length===0?'Все':selCats.length===1?selCats[0]:`${selCats.length} катег.`;

  const startRev=()=>{
    const prods=getProdByCats(selCats);
    setItems(prods.map(p=>({id:uid(),product:p,actual:null})));
    setPage(1);
    setStep('revision');
  };

  const updActual=(id,val)=>setItems(prev=>prev.map(i=>i.id===id?{...i,actual:val===''?null:+val}:i));

  const checked=items.filter(i=>i.actual!==null).length;
  const sumExp=items.filter(i=>i.actual!==null).reduce((s,i)=>s+i.product.totalQty*(i.product.price||0),0);
  const sumAct=items.filter(i=>i.actual!==null).reduce((s,i)=>s+i.actual*(i.product.price||0),0);

  const saveRev=async()=>{
    const rev=await dbInsert('revisions',{category:catLabel,date});
    const revId=rev.id;
    await dbInsertMany('revision_items',items.map(it=>({id:uid(),revision_id:revId,product_name:it.product.product_name,barcode:it.product.barcode,unit:it.product.unit,expected:it.product.totalQty,actual:it.actual,price:it.product.price||0})));
    setSaved(true); setTimeout(()=>onSaved(),1000);
  };

  const searchProds=search.trim().length>=1?products.filter(p=>{
    const q=search.trim().toLowerCase();
    return (p.name||'').toLowerCase().includes(q)||(p.barcode&&p.barcode.includes(search.trim()));
  }).slice(0,6).map(p=>({id:p.id,product_name:p.name,barcode:p.barcode||'',unit:p.unit||'шт',category:p.category,price:p.price||0,totalQty:p.stock||0,partCount:1})):[];

  const addFromSearch=p=>{ if(!items.find(i=>i.product.barcode===p.barcode)) setItems(prev=>[...prev,{id:uid(),product:p,actual:null}]); setSearch(''); };

  if(step==='setup') return(
    <><Hdr title="Новая ревизия" onBack={onBack}/>
    <div style={{padding:14,paddingBottom:30}}>
      <Card><TI label="ДАТА" type="date" value={date} onChange={setDate}/></Card>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <FL>КАТЕГОРИИ</FL>
          {selCats.length>0&&<button onClick={()=>setSelCats([])} style={{fontSize:11,color:C.dim,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}>✕ Сбросить</button>}
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
          <button onClick={()=>setSelCats(selCats.length===cats.length?[]:cats)} style={{padding:'8px 14px',borderRadius:22,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:800,border:`1.5px solid ${selCats.length===cats.length?C.orange+'80':C.border}`,background:selCats.length===cats.length?C.orange+'18':C.bg3,color:selCats.length===cats.length?C.orange:C.dim}}>
            {selCats.length===cats.length?'✓ Все':'Выбрать все'}
          </button>
          {cats.map(cat=>(
            <button key={cat} onClick={()=>toggleCat(cat)} style={{padding:'8px 14px',borderRadius:22,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700,border:`1.5px solid ${selCats.includes(cat)?C.blue+'80':C.border}`,background:selCats.includes(cat)?C.blue+'18':C.bg3,color:selCats.includes(cat)?C.blue:C.muted}}>
              {selCats.includes(cat)?'✓ ':''}{cat}
            </button>
          ))}
        </div>
        {selCats.length>0&&<div style={{marginTop:12,fontSize:12,color:C.dim}}>Выбрано {selCats.length} катег. · {getProdByCats(selCats).length} товаров</div>}

      <Btn bg={C.blue} onClick={startRev} disabled={selCats.length===0}>{selCats.length>0?`📦 Начать · ${getProdByCats(selCats).length} товаров`:'Выбери хотя бы одну категорию'}</Btn>
    </div></>
  );

  const visItems=items.slice(0,page*PAGE);
  const hasMore=items.length>page*PAGE;

function RevisionView({revision,onBack,onDeleted}){
  const [confirmDel,setConfirmDel]=useState(false);
  const [editMode,setEditMode]=useState(false);
  const [editValues,setEditValues]=useState({});
  const [saving,setSaving]=useState(false);

  const items=dbGet('revision_items').filter(i=>i.revision_id===revision.id);
  const short=items.filter(i=>i.actual!==null&&i.actual<i.expected);
  const sumExp=items.filter(i=>i.actual!==null).reduce((s,i)=>s+i.expected*(i.price||0),0);
  const sumAct=items.filter(i=>i.actual!==null).reduce((s,i)=>s+i.actual*(i.price||0),0);
  const loss=sumExp-sumAct;

  const startEdit=()=>{
    const vals={};
    items.forEach(i=>{ vals[i.id]=i.actual!==null?String(i.actual):''; });
    setEditValues(vals);
    setEditMode(true);
  };

  const saveEdit=async()=>{
    setSaving(true);
    for(const item of items){
      const val=editValues[item.id];
      const actual=val===''?null:+val;
      await fetch(`${SB}/revision_items?id=eq.${item.id}`,{method:'PATCH',headers:H,body:JSON.stringify({actual})});
      const idx=DB.revision_items.findIndex(i=>i.id===item.id);
      if(idx>=0) DB.revision_items[idx]={...DB.revision_items[idx],actual};
    }
    pub();
    setEditMode(false);
    setSaving(false);
  };

  const doDelete=async()=>{
    for(const item of items) await sbDel('revision_items',item.id);
    await sbDel('revisions',revision.id);
    DB.revision_items=DB.revision_items.filter(i=>i.revision_id!==revision.id);
    DB.revisions=DB.revisions.filter(r=>r.id!==revision.id);
    pub(); onDeleted();
  };

  return(
    <><Hdr title={fmtD(revision.date)} sub={(revision.category||'РЕВИЗИЯ').toUpperCase()} onBack={onBack}>
      <div style={{display:'flex',gap:6}}>
        {!editMode&&<button onClick={startEdit} style={{width:38,height:38,borderRadius:11,background:'#4466ff18',border:`1px solid #4466ff40`,color:C.blue,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✏️</button>}
        <button onClick={()=>setConfirmDel(true)} style={{width:38,height:38,borderRadius:11,background:'#f04f5a18',border:`1px solid #f04f5a40`,color:C.red,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>🗑</button>
      </div>
    </Hdr>

    {confirmDel&&(
      <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.7)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
        <div style={{background:C.bg2,border:`1px solid ${C.red}50`,borderRadius:20,padding:24,width:'100%',maxWidth:380}}>
          <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>Удалить ревизию?</div>
          <div style={{fontSize:13,color:C.dim,marginBottom:20}}>Ревизия от {fmtD(revision.date)} · {items.length} позиций будет удалена безвозвратно</div>
          <div style={{display:'flex',gap:10}}>
            <Btn outline onClick={()=>setConfirmDel(false)} style={{flex:1,padding:'12px 0'}}>Отмена</Btn>
            <Btn bg={C.red} onClick={doDelete} style={{flex:1,padding:'12px 0'}}>Удалить</Btn>
          </div>
        </div>
      </div>
    )}

    <div style={{padding:14,paddingBottom:editMode?160:30}}>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {[['Позиций',items.length,C.blue],['Недостача',short.length,short.length>0?C.red:C.green]].map(([l,v,c])=>(
          <div key={l} style={{flex:1,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,padding:'13px 10px',textAlign:'center'}}><div style={{fontSize:9,color:C.dim,fontWeight:800,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>{l}</div><div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div></div>
        ))}
      </div>
      {items.filter(i=>i.actual!==null).length>0&&(
        <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,overflow:'hidden',marginBottom:12}}>
          <div style={{display:'flex',borderBottom:`1px solid ${C.border}`}}>
            <div style={{flex:1,padding:'14px 16px',borderRight:`1px solid ${C.border}`,textAlign:'center'}}><div style={{fontSize:9,fontWeight:800,color:C.dim,marginBottom:4}}>БЫЛО</div><div style={{fontSize:18,fontWeight:900,color:C.muted}}>{fmt(sumExp)} SM</div></div>
            <div style={{flex:1,padding:'14px 16px',textAlign:'center'}}><div style={{fontSize:9,fontWeight:800,color:C.dim,marginBottom:4}}>ОСТАЛОСЬ</div><div style={{fontSize:18,fontWeight:900,color:loss>0?C.red:C.green}}>{fmt(sumAct)} SM</div></div>
          </div>
          <div style={{padding:'12px 16px',background:loss>0?'#f04f5a10':'#3ecf8e10',display:'flex',justifyContent:'space-between'}}>
            <div style={{fontSize:10,fontWeight:800,color:C.dim}}>{loss>0?'ПОТЕРИ':'РЕЗУЛЬТАТ'}</div>
            <div style={{fontSize:22,fontWeight:900,color:loss>0?C.red:C.green}}>{loss>0?'-':''}{fmt(Math.abs(loss))} SM</div>
          </div>
        </div>
      )}
      <Card>
        {items.map((item,i)=>{
          const val=editMode?editValues[item.id]??'':null;
          const actual=editMode?(val===''?null:+val):item.actual;
          const diff=actual!==null?actual-item.expected:null;
          const dc=diff===null?C.dim:diff<0?C.red:diff>0?C.orange:C.green;
          return(
            <div key={item.id} style={{padding:'12px 0',borderBottom:i<items.length-1?`1px solid ${C.border}`:'none'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,marginBottom:3}}>{item.product_name}</div>{item.barcode&&<div style={{fontSize:11,color:C.dim}}>🏷 {item.barcode}</div>}</div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  {editMode?(
                    <div>
                      <div style={{fontSize:11,color:C.dim,marginBottom:4}}>Ожид: <b>{item.expected}</b></div>
                      <input type="number" value={editValues[item.id]??''} onChange={e=>setEditValues(prev=>({...prev,[item.id]:e.target.value}))}
                        style={{width:70,padding:'7px 6px',borderRadius:9,textAlign:'center',background:C.bg,border:`1.5px solid ${dc}`,color:dc,fontSize:16,fontWeight:900,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
                      {diff!==null&&<div style={{fontSize:12,fontWeight:800,color:dc,marginTop:3}}>{diff>0?'+':''}{diff}</div>}
                    </div>
                  ):(
                    <div>
                      <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginBottom:4}}><span style={{fontSize:11,color:C.dim}}>Ожид: <b style={{color:C.muted}}>{item.expected}</b></span>{item.actual!==null&&<span style={{fontSize:11,color:C.dim}}>Факт: <b style={{color:dc}}>{item.actual}</b></span>}</div>
                      {diff!==null&&<span style={{fontSize:13,fontWeight:900,padding:'3px 10px',borderRadius:8,background:dc+'18',color:dc,display:'inline-block'}}>{diff>0?'+':''}{diff} {item.unit}</span>}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </Card>
    </div>

    {editMode&&(
      <div style={{position:'fixed',bottom:64,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,padding:'10px 14px',background:'rgba(9,9,15,.97)',borderTop:`1px solid ${C.border}`,zIndex:150,display:'flex',gap:8}}>
        <Btn outline onClick={()=>setEditMode(false)} style={{width:52,flex:'none',padding:'14px 0'}}>✕</Btn>
        <Btn bg={C.green} color="#051a0e" onClick={saveEdit} disabled={saving} style={{flex:1}}>{saving?'Сохранение...':'✓ Сохранить изменения'}</Btn>
      </div>
    )}
    </>
  );
}

function Finance({tick}){
  const [tab,setTab]=useState('expenses');
  const exp=dbGet('expenses'), rev=dbGet('revenue'), cash=dbGet('cash_movements');
  let cashBal=0; cash.forEach(m=>{ if(m.type==='add'||m.type==='revenue') cashBal+= +m.amount; else cashBal-= +m.amount; });
  const t=tod();
  const todayRev=rev.filter(r=>r.date===t).reduce((s,r)=>s+ +r.amount,0);
  const todayExp=exp.filter(e=>e.date===t).reduce((s,e)=>s+ +e.amount,0);
  return(
    <>
      <div style={{padding:'14px 16px 12px',background:'rgba(9,9,15,.97)',backdropFilter:'blur(20px)',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:50}}>
        <div style={{fontSize:9,fontWeight:800,letterSpacing:2.5,textTransform:'uppercase',color:C.dim}}>ФИНАНСЫ</div>
        <div style={{fontSize:20,fontWeight:900,letterSpacing:-.5,marginBottom:12}}>💰 Финансы</div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          {[['Выручка',`+${fmt(todayRev)}`,C.green],['Расходы',`−${fmt(todayExp)}`,C.red],['Касса',`${fmt(Math.abs(cashBal))}`,cashBal>=0?C.blue:C.red]].map(([l,v,c])=>(
            <div key={l} style={{flex:1,background:C.bg3,borderRadius:10,padding:'8px 10px'}}><div style={{fontSize:8,fontWeight:800,letterSpacing:1,color:C.dim,marginBottom:3}}>{l.toUpperCase()}</div><div style={{fontSize:13,fontWeight:900,color:c}}>{v}</div></div>
          ))}
        </div>
        <div style={{display:'flex',gap:6}}>
          {[['expenses','💸 Расходы'],['revenue','💰 Выручка'],['cash','🏧 Касса']].map(([id,l])=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'9px 4px',borderRadius:11,cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:800,border:`1.5px solid ${tab===id?C.blue+'60':C.border}`,background:tab===id?C.blue+'18':C.bg2,color:tab===id?C.blue:C.dim}}>{l}</button>
          ))}
        </div>
      </div>
      {tab==='expenses'&&<ExpensesTab tick={tick}/>}
      {tab==='revenue'&&<RevenueTab tick={tick}/>}
      {tab==='cash'&&<CashTab tick={tick}/>}
    </>
  );
}

function RevenueTab({tick}){
  const [amount,setAmount]=useState('');
  const [gbsProfit,setGbsProfit]=useState('');
  const [date,setDate]=useState(tod());
  const [delId,setDelId]=useState(null);
  const all=dbGet('revenue').sort((a,b)=>b.created_at.localeCompare(a.created_at));
  const totalRev=all.reduce((s,r)=>s+ +r.amount,0);
  const totalProfit=all.reduce((s,r)=>s+ +(r.profit||0),0);
  const todayRev=all.filter(r=>r.date===tod()).reduce((s,r)=>s+ +r.amount,0);
  const save=async()=>{
    if(!amount)return;
    await dbInsert('revenue',{amount:+amount,profit:gbsProfit?+gbsProfit:null,date,source:'manual'});
    await dbInsert('cash_movements',{type:'revenue',amount:+amount,description:'Выручка',date});
    setAmount(''); setGbsProfit('');
  };
  return(
    <div style={{padding:14,paddingBottom:30}}>
      {delId&&<DelConfirm text="Запись выручки будет удалена" onConfirm={async()=>{ await dbDelete('revenue',delId); setDelId(null); }} onCancel={()=>setDelId(null)}/>}
      <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,overflow:'hidden',marginBottom:14}}>
        <div style={{padding:'10px 16px',background:C.bg3,borderBottom:`1px solid ${C.border}`}}><div style={{fontSize:9,fontWeight:800,letterSpacing:2,color:C.dim}}>ФИНАНСОВЫЕ ИТОГИ</div></div>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.dim,marginBottom:4}}>ВЫРУЧКА СЕГОДНЯ</div><div style={{fontSize:32,fontWeight:900,color:C.green}}>{fmt(todayRev)} SM</div></div>
        <div style={{display:'flex'}}>
          <div style={{flex:1,padding:'14px 16px',borderRight:`1px solid ${C.border}`}}><div style={{fontSize:9,fontWeight:800,color:C.dim,marginBottom:4}}>ВЫРУЧКА ВСЕГО</div><div style={{fontSize:18,fontWeight:900,color:C.green}}>{fmt(totalRev)} SM</div></div>
          <div style={{flex:1,padding:'14px 16px'}}><div style={{fontSize:9,fontWeight:800,color:C.dim,marginBottom:4}}>ПРИБЫЛЬ GBS</div><div style={{fontSize:18,fontWeight:900,color:C.blue}}>{fmt(totalProfit)} SM</div></div>
        </div>
      </div>
      <Card>
        <div style={{fontSize:11,fontWeight:800,letterSpacing:2,color:C.dim,marginBottom:12}}>ДОБАВИТЬ ВЫРУЧКУ</div>
        <TI label="ВЫРУЧКА (SM)" type="number" placeholder="0.00" value={amount} onChange={setAmount} autoFocus/>
        <TI label="ПРИБЫЛЬ GBS (SM) — необязательно" type="number" placeholder="из GBS.Market" value={gbsProfit} onChange={setGbsProfit}/>
        <div style={{marginBottom:12}}><FL>ДАТА</FL><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,padding:'13px 16px',color:C.text,fontSize:15,outline:'none',WebkitAppearance:'none'}}/></div>
        <Btn bg={C.green} color="#051a0e" onClick={save} disabled={!amount}>+ Добавить выручку</Btn>
      </Card>
      <SecLabel>История выручки</SecLabel>
      {!all.length?<Empty icon="💰" text="Записей нет"/>:
      all.map(r=>(
        <div key={r.id} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:8}}>
          <div style={{width:44,height:44,borderRadius:12,background:'#3ecf8e18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>💰</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:800,color:C.green,marginBottom:3}}>+{fmt(r.amount)} SM</div>
            <div style={{fontSize:12,color:C.dim}}>Прибыль GBS: <b style={{color:C.blue}}>{fmt(r.profit||0)} SM</b></div>
            <div style={{fontSize:11,color:C.dim,marginTop:2}}>{fmtD(r.date)} · {fmtT(r.created_at)}</div>
          </div>
          <button onClick={()=>setDelId(r.id)} style={{background:'none',border:'none',color:C.dim,fontSize:20,cursor:'pointer',padding:4,flexShrink:0}}>🗑</button>
        </div>
      ))}
    </div>
  );
}

function CashTab({tick}){
  const [action,setAction]=useState('add');
  const [amount,setAmount]=useState('');
  const [desc,setDesc]=useState('');
  const [delId,setDelId]=useState(null);
  const movements=dbGet('cash_movements').sort((a,b)=>b.created_at.localeCompare(a.created_at));
  let balance=0; movements.forEach(m=>{ if(m.type==='add'||m.type==='revenue') balance+= +m.amount; else balance-= +m.amount; });
  const todayMov=movements.filter(m=>m.date===tod());
  const todayIn=todayMov.filter(m=>m.type==='add'||m.type==='revenue').reduce((s,m)=>s+ +m.amount,0);
  const todayOut=todayMov.filter(m=>m.type!=='add'&&m.type!=='revenue').reduce((s,m)=>s+ +m.amount,0);
  const TYPE_LABEL={remove:'Снято',expense:'Расход',revenue:'Выручка',add:'Добавлено'};
  const TYPE_ICON={remove:'➖',expense:'💸',revenue:'💰',add:'➕'};
  const TYPE_COLOR={remove:C.red,expense:C.red,revenue:C.green,add:C.green};
  const isPlus=t=>t==='revenue'||t==='add';
  const save=async()=>{
    if(!amount)return;
    await dbInsert('cash_movements',{type:action,amount:+amount,description:desc.trim()||(action==='add'?'Внесено':'Снятие'),date:tod()});
    setAmount(''); setDesc('');
  };
  return(
    <div style={{padding:14,paddingBottom:30}}>
      {delId&&<DelConfirm text="Запись движения кассы будет удалена" onConfirm={async()=>{ await dbDelete('cash_movements',delId); setDelId(null); }} onCancel={()=>setDelId(null)}/>}
      <div style={{background:C.bg2,border:`1.5px solid ${balance>=0?C.green+'40':C.red+'40'}`,borderRadius:18,padding:'22px 20px',marginBottom:10,textAlign:'center'}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:2.5,color:C.dim,marginBottom:8}}>НАЛИЧНЫЕ В КАССЕ</div>
        <div style={{fontSize:46,fontWeight:900,color:balance>=0?C.green:C.red,letterSpacing:-1}}>{fmt(Math.abs(balance))} SM</div>
        {balance<0&&<div style={{fontSize:13,color:C.red,marginTop:8,fontWeight:700}}>⚠ Касса в минусе!</div>}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <div style={{flex:1,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,padding:'12px 14px'}}><div style={{fontSize:9,fontWeight:800,color:C.dim,marginBottom:4}}>ПРИХОД СЕГОДНЯ</div><div style={{fontSize:18,fontWeight:900,color:C.green}}>+{fmt(todayIn)} SM</div></div>
        <div style={{flex:1,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,padding:'12px 14px'}}><div style={{fontSize:9,fontWeight:800,color:C.dim,marginBottom:4}}>РАСХОД СЕГОДНЯ</div><div style={{fontSize:18,fontWeight:900,color:C.red}}>−{fmt(todayOut)} SM</div></div>
      </div>
      <Card>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button onClick={()=>setAction('add')} style={{flex:1,padding:'11px 8px',borderRadius:11,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:800,border:`1.5px solid ${action==='add'?C.green+'60':C.border}`,background:action==='add'?C.green+'18':C.bg2,color:action==='add'?C.green:C.dim}}>➕ Добавить</button>
          <button onClick={()=>setAction('remove')} style={{flex:1,padding:'11px 8px',borderRadius:11,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:800,border:`1.5px solid ${action==='remove'?C.red+'60':C.border}`,background:action==='remove'?C.red+'18':C.bg2,color:action==='remove'?C.red:C.dim}}>➖ Снять</button>
        </div>
        <TI label="СУММА (SM)" type="number" placeholder="0.00" value={amount} onChange={setAmount} autoFocus/>
        <TI label="ОПИСАНИЕ" placeholder={action==='add'?'Откуда...':'Куда снял...'} value={desc} onChange={setDesc}/>
        <Btn bg={action==='add'?C.green:C.red} color={action==='add'?'#051a0e':'#fff'} onClick={save} disabled={!amount}>{action==='add'?'+ Добавить в кассу':'− Снять из кассы'}</Btn>
      </Card>
      <SecLabel>История движений · {movements.length}</SecLabel>
      {!movements.length?<Empty icon="🏧" text="Движений нет"/>:
      movements.map(m=>(
        <div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:8}}>
          <div style={{width:44,height:44,borderRadius:12,background:TYPE_COLOR[m.type]+'15',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{TYPE_ICON[m.type]||'💵'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:800,color:TYPE_COLOR[m.type]||C.muted,marginBottom:3}}>{isPlus(m.type)?'+':'−'}{fmt(m.amount)} SM</div>
            <div style={{fontSize:12,color:C.muted}}>{TYPE_LABEL[m.type]||m.type}{m.description?` · ${m.description}`:''}</div>
            <div style={{fontSize:11,color:C.dim,marginTop:2}}>{fmtD(m.date)} · {fmtT(m.created_at)}</div>
          </div>
          <button onClick={()=>setDelId(m.id)} style={{background:'none',border:'none',color:C.dim,fontSize:20,cursor:'pointer',padding:4,flexShrink:0}}>🗑</button>
        </div>
      ))}
    </div>
  );
}


// ════════════════════════════════════════════
//  ГЛАВНЫЙ КОМПОНЕНТ
// ════════════════════════════════════════════
function App(){
  const [ready,setReady]=useState(false);
  const [tab,setTab]=useState('home');
  const [tick,setTick]=useState(0);
  const [toastMsg,setToastMsg]=useState(null);

  useEffect(()=>{ initDB().then(()=>setReady(true)); return sub(()=>setTick(t=>t+1)); },[]);

  const showToast=(msg,color)=>{ setToastMsg({msg,color}); setTimeout(()=>setToastMsg(null),2500); };

  if(!ready) return(
    <div style={{background:C.bg,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14,fontFamily:'system-ui'}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{fontSize:56}}>🏪</div>
      <div style={{fontSize:20,fontWeight:900,color:'#eeeeff'}}>KassaControl</div>
      <div style={{width:28,height:28,border:'2px solid #1e1e38',borderTopColor:'#4466ff',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
    </div>
  );

  const NAV=[
    {id:'home',   icon:'🏠', label:'Главная'},
    {id:'supply', icon:'🚚', label:'Поставки'},
    {id:'expiry', icon:'☠️', label:'Сроки'},
    {id:'revision',icon:'📦',label:'Ревизия'},
    {id:'finance',icon:'💰', label:'Финансы'},
  ];

  // Бейдж на сроках
  const diItems=dbGet('delivery_items');
  const alertCount=diItems.filter(i=>i.expiry_date&&dLeft(i.expiry_date)<0).length+diItems.filter(i=>i.expiry_date&&dLeft(i.expiry_date)>=0&&dLeft(i.expiry_date)<=3).length;

  return(
    <div style={{background:C.bg,color:C.text,minHeight:'100vh',fontFamily:'system-ui,-apple-system,sans-serif',maxWidth:430,margin:'0 auto',paddingBottom:80}}>
      <style>{css}</style>
      <Toast msg={toastMsg?.msg} color={toastMsg?.color}/>

      {tab==='home'    &&<Home     tick={tick}/>}
      {tab==='supply'  &&<Suppliers tick={tick} toast={showToast}/>}
      {tab==='expiry'  &&<Expiry   tick={tick}/>}
      {tab==='revision'&&<Revision  tick={tick} toast={showToast}/>}
      {tab==='finance' &&<Finance   tick={tick}/>}

      {/* НИЖНЯЯ НАВИГАЦИЯ */}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:'rgba(9,9,15,.97)',backdropFilter:'blur(20px)',borderTop:`1px solid ${C.border}`,display:'flex',zIndex:100,paddingBottom:'env(safe-area-inset-bottom,0)'}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:'10px 0 13px',background:'none',border:'none',borderTop:`2px solid ${tab===n.id?C.blue:'transparent'}`,cursor:'pointer',color:tab===n.id?C.blue:C.dim,display:'flex',flexDirection:'column',alignItems:'center',gap:2,fontFamily:'inherit',position:'relative'}}>
            <span style={{fontSize:21}}>{n.icon}</span>
            <span style={{fontSize:9,fontWeight:800,letterSpacing:.5,textTransform:'uppercase'}}>{n.label}</span>
            {n.id==='expiry'&&alertCount>0&&<span style={{position:'absolute',top:6,right:'50%',transform:'translateX(8px)',background:C.red,borderRadius:10,minWidth:16,height:16,fontSize:10,fontWeight:900,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{alertCount}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
